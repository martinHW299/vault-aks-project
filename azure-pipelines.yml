# Starter CI/CD pipeline for this repo (ms-java -> ACR -> AKS)
#
# Prereqs in Azure DevOps:
# - Create an Azure Resource Manager service connection (name below in `azureSubscription`)
# - Grant it `AcrPush` on the ACR and permissions to access the AKS cluster
#
# Notes:
# - This pipeline builds and pushes a Docker image, then deploys Kubernetes manifests from `k8s/ms-java/`
# - The deployment image is updated at deploy-time via `kubectl set image` (so the YAML can keep a placeholder tag)
#

trigger:
  branches:
    include:
      - develop

pr:
  branches:
    include:
      - develop

pool:
  name: Default

variables:
  # Azure DevOps service connection name (Project settings -> Service connections)
  azureSubscription: "sc-aks-acr-dev"

  # Azure resources
  acrName: "acrbci"
  aksResourceGroup: "rg-bci-infra"
  aksClusterName: "aks-bci-infra"

  # App identifiers
  imageName: "ms-java"
  k8sNamespace: "bci-cit-test"

  # Paths
  dockerContext: "ms-java"
  manifestsPath: "k8s/ms-java"

stages:
  - stage: BuildAndPush
    displayName: Build and push image
    jobs:
      - job: Build
        displayName: Build
        steps:
          - checkout: self

          - bash: |
              set -euo pipefail
              docker --version
              docker run --rm \
                -v "$(Build.SourcesDirectory)/ms-java:/app" \
                -w /app \
                maven:3.9-eclipse-temurin-21 \
                mvn -q test
            displayName: Test (ms-java)

          - task: PublishTestResults@2
            displayName: Publish test results (ms-java)
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: "ms-java/target/surefire-reports/TEST-*.xml"
              failTaskOnFailedTests: true

          - task: AzureCLI@2
            displayName: Build and push to ACR
            inputs:
              azureSubscription: "$(azureSubscription)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                ACR_LOGIN_SERVER="$(acrName).azurecr.io"
                IMAGE_TAG="$(Build.SourceVersion)"

                echo "##vso[task.setvariable variable=acrLoginServer;isOutput=true]${ACR_LOGIN_SERVER}"
                echo "##vso[task.setvariable variable=imageTag;isOutput=true]${IMAGE_TAG}"

                az acr login --name "$(acrName)"

                docker build \
                  -t "${ACR_LOGIN_SERVER}/$(imageName):${IMAGE_TAG}" \
                  "$(dockerContext)"

                docker push "${ACR_LOGIN_SERVER}/$(imageName):${IMAGE_TAG}"
            name: acr

  - stage: Deploy
    displayName: Deploy to AKS
    dependsOn: BuildAndPush
    jobs:
      - job: Deploy
        displayName: Deploy
        variables:
          acrLoginServer: $[ stageDependencies.BuildAndPush.Build.outputs['acr.acrLoginServer'] ]
          imageTag: $[ stageDependencies.BuildAndPush.Build.outputs['acr.imageTag'] ]
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: kubectl apply + set image
            inputs:
              azureSubscription: "$(azureSubscription)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                echo "Using image: $(acrLoginServer)/$(imageName):$(imageTag)"

                # Ensure kubectl is available/up-to-date on the agent
                az aks install-cli

                az aks get-credentials \
                  --resource-group "$(aksResourceGroup)" \
                  --name "$(aksClusterName)" \
                  --overwrite-existing

                kubectl apply -f "$(manifestsPath)/00-namespace.yaml"
                # NOTE: Prefer NOT storing real secrets in git. Consider generating this from Key Vault / variable group.
                kubectl apply -f "$(manifestsPath)/01-secret-approle.yaml"
                kubectl apply -f "$(manifestsPath)/03-service.yaml"
                kubectl apply -f "$(manifestsPath)/02-deployment.yaml"

                kubectl -n "$(k8sNamespace)" set image deployment/ms-java \
                  ms-java="$(acrLoginServer)/$(imageName):$(imageTag)"

                kubectl -n "$(k8sNamespace)" rollout status deployment/ms-java --timeout=180s
